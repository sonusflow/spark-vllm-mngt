name: VLLMManager
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO
    PRODUCT_NAME: "$(TARGET_NAME)"

targets:
  VLLMManager:
    type: application
    platform: macOS
    sources:
      - path: Sources/VLLMManager
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.local.vllm-manager
        GENERATE_INFOPLIST_FILE: NO
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    dependencies:
      - target: VLLMWidgetExtension
        embed: true
        codeSign: true

  VLLMWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: WidgetExtension
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: WidgetExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.local.vllm-manager.widget
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
